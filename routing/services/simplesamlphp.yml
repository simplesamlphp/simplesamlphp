---

services:
  # default configuration for services in *this* file
  _defaults:
    autowire: true
    autoconfigure: true

  SimpleSAML\Configuration:
    factory: ['SimpleSAML\Configuration', 'getInstance']

  SimpleSAML\Session:
    factory: ['SimpleSAML\Session', 'getSessionFromRequest']

  SimpleSAML\Auth\AuthenticationFactory: ~

  SimpleSAML\Utils\HTTP: ~

  SimpleSAML\EventSubscriber\ExceptionSubscriber:
    tags: ['kernel.event_subscriber']

  SimpleSAML\EventSubscriber\SecurityHeadersSubscriber:
    tags: ['kernel.event_subscriber']
